<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- European Castle/Fortress -->
  <!-- Main wall base -->
  <rect x="8" y="36" width="48" height="20" rx="1" fill="#60a5fa"/>
  <!-- Gate arch -->
  <path d="M26 56 L26 44 Q32 38 38 44 L38 56 Z" fill="#1e3a5f"/>
  <!-- Left tower -->
  <rect x="8" y="22" width="13" height="34" rx="1" fill="#60a5fa"/>
  <!-- Left tower battlements -->
  <rect x="7" y="17" width="4" height="7" rx="0.5" fill="#2563eb"/>
  <rect x="13" y="17" width="4" height="7" rx="0.5" fill="#2563eb"/>
  <rect x="19" y="17" width="3" height="7" rx="0.5" fill="#2563eb"/>
  <!-- Right tower -->
  <rect x="43" y="22" width="13" height="34" rx="1" fill="#60a5fa"/>
  <!-- Right tower battlements -->
  <rect x="42" y="17" width="4" height="7" rx="0.5" fill="#2563eb"/>
  <rect x="48" y="17" width="4" height="7" rx="0.5" fill="#2563eb"/>
  <rect x="54" y="17" width="4" height="7" rx="0.5" fill="#2563eb"/>
  <!-- Wall battlements -->
  <rect x="21" y="31" width="4" height="6" rx="0.5" fill="#2563eb"/>
  <rect x="27" y="31" width="4" height="6" rx="0.5" fill="#2563eb"/>
  <rect x="33" y="31" width="4" height="6" rx="0.5" fill="#2563eb"/>
  <rect x="39" y="31" width="4" height="6" rx="0.5" fill="#2563eb"/>
  <!-- Left tower window -->
  <rect x="12" y="28" width="5" height="7" rx="1" fill="#1e3a5f"/>
  <path d="M12 31 Q14.5 27 17 31" fill="#1e3a5f"/>
  <!-- Right tower window -->
  <rect x="47" y="28" width="5" height="7" rx="1" fill="#1e3a5f"/>
  <path d="M47 31 Q49.5 27 52 31" fill="#1e3a5f"/>
  <!-- Flag on left tower -->
  <line x1="14.5" y1="8" x2="14.5" y2="18" stroke="#2563eb" stroke-width="1.2"/>
  <polygon points="14.5,8 21,11 14.5,14" fill="#93c5fd"/>
  <!-- Flag on right tower -->
  <line x1="49.5" y1="8" x2="49.5" y2="18" stroke="#2563eb" stroke-width="1.2"/>
  <polygon points="49.5,8 56,11 49.5,14" fill="#93c5fd"/>
  <!-- Ground line -->
  <line x1="6" y1="57" x2="58" y2="57" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
</svg>
