<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 64 64">
  <!-- Arabian Mosque with dome and minaret -->
  <!-- Main building body -->
  <rect x="14" y="34" width="36" height="22" rx="1" fill="#fb923c"/>
  <!-- Main dome -->
  <path d="M20 34 Q20 16 32 14 Q44 16 44 34 Z" fill="#ea580c"/>
  <!-- Dome finial -->
  <line x1="32" y1="7" x2="32" y2="14" stroke="#fed7aa" stroke-width="1.5"/>
  <path d="M30 9 Q32 6 34 9" fill="none" stroke="#fed7aa" stroke-width="1.2"/>
  <!-- Left minaret -->
  <rect x="7" y="20" width="7" height="36" rx="1" fill="#fb923c"/>
  <!-- Left minaret balcony -->
  <rect x="5" y="30" width="11" height="3" rx="0.5" fill="#ea580c"/>
  <!-- Left minaret top bulb -->
  <ellipse cx="10.5" cy="18" rx="4" ry="5" fill="#ea580c"/>
  <line x1="10.5" y1="10" x2="10.5" y2="18" stroke="#fed7aa" stroke-width="1.2"/>
  <!-- Right minaret -->
  <rect x="50" y="20" width="7" height="36" rx="1" fill="#fb923c"/>
  <!-- Right minaret balcony -->
  <rect x="48" y="30" width="11" height="3" rx="0.5" fill="#ea580c"/>
  <!-- Right minaret top bulb -->
  <ellipse cx="53.5" cy="18" rx="4" ry="5" fill="#ea580c"/>
  <line x1="53.5" y1="10" x2="53.5" y2="18" stroke="#fed7aa" stroke-width="1.2"/>
  <!-- Main entrance arch (pointed) -->
  <path d="M26 56 L26 45 Q32 38 38 45 L38 56 Z" fill="#7c2d12"/>
  <!-- Side arched windows -->
  <path d="M17 48 L17 42 Q20 38 23 42 L23 48 Z" fill="#7c2d12"/>
  <path d="M41 48 L41 42 Q44 38 47 42 L47 48 Z" fill="#7c2d12"/>
  <!-- Crescent on dome -->
  <path d="M30 22 Q32 19 34 22 Q31 20 30 22 Z" fill="#fed7aa"/>
  <!-- Ground -->
  <line x1="5" y1="57" x2="59" y2="57" stroke="#ea580c" stroke-width="1.5" stroke-linecap="round"/>
</svg>
