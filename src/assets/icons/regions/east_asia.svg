<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- East Asian Pagoda -->
  <!-- Ground base -->
  <rect x="10" y="54" width="44" height="4" rx="1" fill="#dc2626"/>
  <!-- First floor -->
  <rect x="14" y="46" width="36" height="9" rx="0.5" fill="#f87171"/>
  <!-- First floor roof (curved eaves) -->
  <path d="M8 46 Q14 41 32 43 Q50 41 56 46 Z" fill="#dc2626"/>
  <path d="M8 46 Q14 44 32 45.5 Q50 44 56 46" fill="none" stroke="#b91c1c" stroke-width="0.8"/>
  <!-- First floor eave tips -->
  <path d="M8 46 Q6 44 7 42" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M56 46 Q58 44 57 42" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Second floor -->
  <rect x="19" y="37" width="26" height="10" rx="0.5" fill="#f87171"/>
  <!-- Second floor roof -->
  <path d="M13 37 Q19 32 32 34 Q45 32 51 37 Z" fill="#dc2626"/>
  <path d="M13 37 Q19 35 32 36.5 Q45 35 51 37" fill="none" stroke="#b91c1c" stroke-width="0.8"/>
  <path d="M13 37 Q11 35 12 33" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M51 37 Q53 35 52 33" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Third floor -->
  <rect x="23" y="28" width="18" height="10" rx="0.5" fill="#f87171"/>
  <!-- Third floor roof -->
  <path d="M17 28 Q23 23 32 25 Q41 23 47 28 Z" fill="#dc2626"/>
  <path d="M17 28 Q23 26 32 27.5 Q41 26 47 28" fill="none" stroke="#b91c1c" stroke-width="0.8"/>
  <path d="M17 28 Q15 26 16 24" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M47 28 Q49 26 48 24" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Fourth floor -->
  <rect x="27" y="20" width="10" height="9" rx="0.5" fill="#f87171"/>
  <!-- Fourth floor roof -->
  <path d="M22 20 Q27 15 32 17 Q37 15 42 20 Z" fill="#dc2626"/>
  <path d="M22 20 Q27 18 32 19.5 Q37 18 42 20" fill="none" stroke="#b91c1c" stroke-width="0.8"/>
  <!-- Top spire -->
  <rect x="30" y="12" width="4" height="9" rx="0.5" fill="#dc2626"/>
  <polygon points="32,6 35,13 29,13" fill="#b91c1c"/>
  <!-- Ornament ball on top -->
  <circle cx="32" cy="5.5" r="2" fill="#fca5a5"/>
  <!-- Main door -->
  <path d="M29 55 L29 49 Q32 46 35 49 L35 55 Z" fill="#7f1d1d"/>
  <!-- Windows second floor -->
  <rect x="22" y="40" width="5" height="5" rx="0.5" fill="#7f1d1d"/>
  <rect x="37" y="40" width="5" height="5" rx="0.5" fill="#7f1d1d"/>
</svg>
