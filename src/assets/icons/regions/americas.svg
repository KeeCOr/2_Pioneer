  <path d="M24.7 29 L39.3 29 L39.7 26 L24.3 26 Z" fill="#0284c7"/>
  <!-- Lantern room base -->
  <rect x="23" y="14" width="18" height="7" rx="1" fill="#0369a1"/>
  <!-- Gallery railing -->
  <rect x="22" y="14" width="20" height="2" rx="0.5" fill="#0284c7"/>
