<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Lighthouse -->
  <!-- Base platform -->
  <rect x="10" y="54" width="44" height="4" rx="1" fill="#0284c7"/>
