<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Indian Temple/Pagoda (Shikhara style) -->
  <!-- Base platform (jagati) -->
  <rect x="8" y="52" width="48" height="5" rx="1" fill="#059669"/>
  <!-- Second platform -->
  <rect x="13" y="47" width="38" height="6" rx="1" fill="#34d399"/>
  <!-- Main temple body -->
  <rect x="20" y="36" width="24" height="13" rx="1" fill="#34d399"/>
  <!-- Shikhara tower - tapering levels -->
  <rect x="22" y="28" width="20" height="9" rx="1" fill="#10b981"/>
  <rect x="24" y="21" width="16" height="8" rx="1" fill="#34d399"/>
  <rect x="26" y="15" width="12" height="7" rx="1" fill="#10b981"/>
  <rect x="28" y="10" width="8" height="6" rx="1" fill="#34d399"/>
  <!-- Amalaka (top disc) -->
  <ellipse cx="32" cy="9" rx="5" ry="2.5" fill="#059669"/>
  <!-- Kalasha (finial) -->
  <ellipse cx="32" cy="6.5" rx="2" ry="2" fill="#6ee7b7"/>
  <line x1="32" y1="4" x2="32" y2="7" stroke="#6ee7b7" stroke-width="1.5"/>
  <!-- Horizontal moldings on each level -->
  <line x1="22" y1="29" x2="42" y2="29" stroke="#059669" stroke-width="0.8"/>
  <line x1="24" y1="22" x2="40" y2="22" stroke="#059669" stroke-width="0.8"/>
  <line x1="26" y1="16" x2="38" y2="16" stroke="#059669" stroke-width="0.8"/>
  <!-- Main entrance arch -->
  <path d="M27 49 L27 40 Q32 34 37 40 L37 49 Z" fill="#065f46"/>
  <!-- Side niches with arched tops -->
  <path d="M21 44 L21 40 Q23.5 37 26 40 L26 44 Z" fill="#065f46"/>
  <path d="M38 44 L38 40 Q40.5 37 43 40 L43 44 Z" fill="#065f46"/>
  <!-- Decorative corner elements on base -->
  <circle cx="20" cy="49" r="2" fill="#059669"/>
  <circle cx="44" cy="49" r="2" fill="#059669"/>
  <!-- Ground line -->
  <line x1="6" y1="58" x2="58" y2="58" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
</svg>
