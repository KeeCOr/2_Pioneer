<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Mediterranean Church/Cathedral -->
  <!-- Main body -->
  <rect x="16" y="30" width="32" height="26" rx="1" fill="#a78bfa"/>
  <!-- Main dome -->
  <ellipse cx="32" cy="24" rx="10" ry="8" fill="#7c3aed"/>
  <rect x="22" y="24" width="20" height="8" fill="#a78bfa"/>
  <!-- Drum under dome -->
  <rect x="24" y="28" width="16" height="4" fill="#a78bfa"/>
  <!-- Lantern top -->
  <rect x="29" y="12" width="6" height="6" rx="1" fill="#7c3aed"/>
  <ellipse cx="32" cy="12" rx="3" ry="2.5" fill="#6d28d9"/>
  <!-- Cross on top -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="28.5" y1="9" x2="35.5" y2="9" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round"/>
  <!-- Side nave left -->
  <rect x="8" y="38" width="10" height="18" rx="1" fill="#8b5cf6"/>
  <!-- Side nave right -->
  <rect x="46" y="38" width="10" height="18" rx="1" fill="#8b5cf6"/>
  <!-- Small side domes -->
  <ellipse cx="13" cy="35" rx="5" ry="4" fill="#7c3aed"/>
  <rect x="8" y="35" width="10" height="4" fill="#8b5cf6"/>
  <ellipse cx="51" cy="35" rx="5" ry="4" fill="#7c3aed"/>
  <rect x="46" y="35" width="10" height="4" fill="#8b5cf6"/>
  <!-- Main entrance arch -->
  <path d="M26 56 L26 44 Q32 38 38 44 L38 56 Z" fill="#4c1d95"/>
  <!-- Windows -->
  <ellipse cx="22" cy="38" rx="3" ry="4" fill="#4c1d95"/>
  <ellipse cx="42" cy="38" rx="3" ry="4" fill="#4c1d95"/>
  <!-- Ground -->
  <line x1="6" y1="57" x2="58" y2="57" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
</svg>
