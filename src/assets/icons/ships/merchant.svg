<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Waterline -->
  <path d="M2 54 Q16 52 32 54 Q48 56 62 54" stroke="#1a3a5c" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Hull keel - round merchant hull -->
  <path d="M8 50 Q12 55 20 56 L46 56 Q54 55 57 50 Q32 54 8 50Z" fill="#5C4033"/>
  <!-- Hull main - fat round hull -->
  <path d="M9 40 Q7 45 8 50 Q32 54 57 50 Q58 45 56 40 Q46 36 20 36 Q12 36 9 40Z" fill="#8B6914"/>
  <!-- Fore castle -->
  <path d="M53 32 L58 32 L58 40 L53 40Z" fill="#8B6914"/>
  <path d="M52 30 L59 30 L59 33 L52 33Z" fill="#D4A547" opacity="0.7"/>
  <!-- Stern castle (tall) -->
  <path d="M6 28 L14 28 L14 40 L6 40Z" fill="#8B6914"/>
  <rect x="7" y="30" width="3" height="3" rx="0.5" fill="#D4A547" opacity="0.7"/>
  <rect x="11" y="30" width="2" height="3" rx="0.5" fill="#D4A547" opacity="0.5"/>
  <path d="M5 26 L15 26 L15 29 L5 29Z" fill="#D4A547" opacity="0.8"/>
  <!-- Hull stripe band -->
  <path d="M9 40 Q32 37 56 40 L56 42 Q32 39 9 42Z" fill="#D4A547" opacity="0.5"/>
  <!-- Gun ports -->
  <rect x="18" y="42" width="3" height="3" rx="0.4" fill="#5C4033"/>
  <rect x="26" y="42" width="3" height="3" rx="0.4" fill="#5C4033"/>
  <rect x="34" y="42" width="3" height="3" rx="0.4" fill="#5C4033"/>
  <rect x="42" y="42" width="3" height="3" rx="0.4" fill="#5C4033"/>
  <!-- Bowsprit -->
  <line x1="57" y1="38" x2="63" y2="30" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Foremast -->
  <line x1="48" y1="40" x2="48" y2="15" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fore yards -->
  <line x1="40" y1="18" x2="56" y2="18" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="26" x2="58" y2="26" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <!-- Fore topsail -->
  <path d="M41 18 L55 18 L57 26 L39 26Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Fore lower sail -->
  <path d="M39 26 L57 26 L58 40 L38 40Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Main mast -->
  <line x1="30" y1="40" x2="30" y2="10" stroke="#5C4033" stroke-width="3" stroke-linecap="round"/>
  <!-- Main yards -->
  <line x1="20" y1="13" x2="40" y2="13" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="42" y2="22" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="31" x2="40" y2="31" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <!-- Main topsail -->
  <path d="M21 13 L39 13 L41 22 L19 22Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Main mid sail -->
  <path d="M19 22 L41 22 L40 31 L20 31Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Main lower sail -->
  <path d="M20 31 L40 31 L40 40 L20 40Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Mizzen mast -->
  <line x1="16" y1="40" x2="16" y2="20" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <!-- Mizzen gaff -->
  <line x1="16" y1="26" x2="26" y2="22" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mizzen sail -->
  <path d="M16 22 L26 23 L26 40 L16 40Z" fill="#F5E6C8" opacity="0.85"/>
  <!-- Sail seams -->
  <line x1="30" y1="13" x2="30" y2="40" stroke="#D4A547" stroke-width="0.5" opacity="0.4"/>
</svg>
