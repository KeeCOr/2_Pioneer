<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Waterline -->
  <path d="M2 52 Q16 50 32 52 Q48 54 62 52" stroke="#1a3a5c" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Hull keel - sleek warship profile -->
  <path d="M8 47 Q11 52 18 53 L50 53 Q57 52 58 47 Q32 51 8 47Z" fill="#5C4033"/>
  <!-- Hull main - narrow and sleek -->
  <path d="M10 38 Q8 42 8 47 Q32 51 58 47 Q59 42 57 38 Q46 35 20 35 Q13 35 10 38Z" fill="#8B6914"/>
  <!-- Sleek sharp bow -->
  <path d="M54 36 L59 34 L60 38 L56 40Z" fill="#8B6914"/>
  <!-- Minimal stern structure (frigate is open) -->
  <path d="M7 30 L14 30 L14 38 L7 38Z" fill="#8B6914"/>
  <rect x="8" y="32" width="3" height="2.5" rx="0.4" fill="#D4A547" opacity="0.8"/>
  <rect x="11.5" y="32" width="2" height="2.5" rx="0.4" fill="#D4A547" opacity="0.6"/>
  <path d="M6 28 L15 28 L15 31 L6 31Z" fill="#D4A547" opacity="0.7"/>
  <!-- Hull stripe (sleek warship) -->
  <path d="M10 38 Q32 35.5 57 38 L57 39.5 Q32 37 10 39.5Z" fill="#D4A547" opacity="0.6"/>
  <!-- Gun ports (single gun deck - frigate) -->
  <rect x="17" y="40" width="3" height="2.5" rx="0.4" fill="#5C4033"/>
  <rect x="23" y="40" width="3" height="2.5" rx="0.4" fill="#5C4033"/>
  <rect x="29" y="40" width="3" height="2.5" rx="0.4" fill="#5C4033"/>
  <rect x="35" y="40" width="3" height="2.5" rx="0.4" fill="#5C4033"/>
  <rect x="41" y="40" width="3" height="2.5" rx="0.4" fill="#5C4033"/>
  <rect x="47" y="40" width="3" height="2.5" rx="0.4" fill="#5C4033"/>
  <!-- Bowsprit (long and angled - frigate style) -->
  <line x1="57" y1="37" x2="63" y2="27" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mizzen mast -->
  <line x1="16" y1="38" x2="16" y2="22" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="26" y2="24" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16 24 L26 25 L26 38 L16 38Z" fill="#F5E6C8" opacity="0.85"/>
  <!-- Main mast (tallest) -->
  <line x1="32" y1="38" x2="32" y2="7" stroke="#5C4033" stroke-width="3" stroke-linecap="round"/>
  <!-- Main topgallant yard -->
  <line x1="26" y1="10" x2="38" y2="10" stroke="#5C4033" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Main topsail yard -->
  <line x1="23" y1="18" x2="41" y2="18" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Main lower yard -->
  <line x1="21" y1="27" x2="43" y2="27" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <!-- Main topgallant -->
  <path d="M27 10 L37 10 L40 18 L24 18Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Main topsail -->
  <path d="M24 18 L40 18 L42 27 L22 27Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Main lower sail -->
  <path d="M22 27 L42 27 L43 38 L21 38Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Foremast -->
  <line x1="46" y1="38" x2="46" y2="12" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fore yards -->
  <line x1="39" y1="15" x2="53" y2="15" stroke="#5C4033" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="23" x2="54" y2="23" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="31" x2="54" y2="31" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <!-- Fore topgallant -->
  <path d="M40 15 L52 15 L53 23 L39 23Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Fore topsail -->
  <path d="M39 23 L53 23 L54 31 L38 31Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Fore lower sail -->
  <path d="M38 31 L54 31 L55 38 L37 38Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Jib sails -->
  <path d="M32 10 L63 27 L57 37Z" fill="#F5E6C8" opacity="0.65"/>
  <path d="M32 18 L63 27 L57 37Z" fill="#F5E6C8" opacity="0.5"/>
</svg>
