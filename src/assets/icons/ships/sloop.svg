<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Waterline -->
  <path d="M4 52 Q16 50 28 52 Q42 54 58 52" stroke="#1a3a5c" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Hull bottom curve -->
  <path d="M8 46 Q10 50 14 52 L50 52 Q54 50 56 46 Q40 50 8 46Z" fill="#5C4033"/>
  <!-- Hull main -->
  <path d="M10 40 Q8 43 8 46 Q32 50 56 46 Q56 43 54 40 Q42 38 22 38 Q14 38 10 40Z" fill="#8B6914"/>
  <!-- Hull upper stripe -->
  <path d="M10 40 Q16 39 32 39 Q46 39 54 40 L54 42 Q40 41 10 42Z" fill="#D4A547" opacity="0.5"/>
  <!-- Gunwale -->
  <path d="M10 40 Q32 38 54 40" stroke="#D4A547" stroke-width="1.5"/>
  <!-- Bowsprit -->
  <line x1="54" y1="40" x2="62" y2="34" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <!-- Main mast -->
  <line x1="30" y1="40" x2="30" y2="14" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Main sail (fore-and-aft) -->
  <path d="M30 16 Q46 22 46 38 L30 38Z" fill="#F5E6C8" opacity="0.95"/>
  <path d="M30 16 Q46 22 46 38 L30 38Z" stroke="#D4A547" stroke-width="0.8"/>
  <!-- Jib sail -->
  <path d="M30 18 L62 34 L54 40Z" fill="#F5E6C8" opacity="0.85"/>
  <path d="M30 18 L62 34 L54 40Z" stroke="#D4A547" stroke-width="0.6"/>
  <!-- Gaff -->
  <line x1="30" y1="22" x2="44" y2="18" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stern detail -->
  <rect x="8" y="40" width="4" height="6" rx="1" fill="#5C4033"/>
</svg>
