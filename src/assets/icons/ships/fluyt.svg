<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Waterline -->
  <path d="M2 54 Q16 52 32 54 Q48 56 62 54" stroke="#1a3a5c" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Fluyt distinctive pear-shaped hull: narrow top, wide bottom -->
  <!-- Hull keel -->
  <path d="M10 50 Q14 56 24 57 L44 57 Q54 56 56 50 Q32 54 10 50Z" fill="#5C4033"/>
  <!-- Hull lower (wide) -->
  <path d="M11 44 Q10 47 10 50 Q32 54 56 50 Q57 47 56 44 Q44 41 20 41 Q14 41 11 44Z" fill="#8B6914"/>
  <!-- Hull upper (narrow - pear shape pinches at top) -->
  <path d="M14 38 Q12 41 11 44 Q32 41.5 56 44 Q55 41 53 38 Q44 36 22 36 Q17 36 14 38Z" fill="#8B6914"/>
  <!-- Pear shape visible: tumblehome inward curve -->
  <path d="M14 38 Q13 40 12 42 Q32 40 55 42 Q55 40 53 38Z" fill="#5C4033" opacity="0.3"/>
  <!-- Distinctive narrow upper deck -->
  <path d="M16 36 Q32 34 52 36 L53 38 Q32 36 14 38Z" fill="#D4A547" opacity="0.5"/>
  <!-- Stern: tall, narrow, ornate -->
  <path d="M8 24 L16 24 L16 38 L8 38Z" fill="#8B6914"/>
  <rect x="9" y="26" width="3" height="3" rx="0.5" fill="#D4A547" opacity="0.8"/>
  <rect x="13" y="26" width="2" height="3" rx="0.5" fill="#D4A547" opacity="0.5"/>
  <path d="M7 22 L17 22 L17 25 L7 25Z" fill="#D4A547" opacity="0.9"/>
  <path d="M8 20 L16 20 L16 23 L8 23Z" fill="#8B6914"/>
  <!-- Flat rounded transom typical of fluyt -->
  <path d="M8 36 L8 50 Q9 52 12 52 L8 50Z" fill="#5C4033"/>
  <!-- Bow and bowsprit -->
  <path d="M52 36 L56 34 L58 38 L55 40Z" fill="#8B6914"/>
  <line x1="55" y1="37" x2="63" y2="28" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hull cargo loading ports (fluyt distinctive feature) -->
  <rect x="22" y="43" width="3" height="4" rx="0.5" fill="#5C4033" opacity="0.8"/>
  <rect x="30" y="43" width="3" height="4" rx="0.5" fill="#5C4033" opacity="0.8"/>
  <rect x="38" y="43" width="3" height="4" rx="0.5" fill="#5C4033" opacity="0.8"/>
  <!-- Foremast -->
  <line x1="46" y1="38" x2="46" y2="15" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="18" x2="54" y2="18" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="26" x2="56" y2="26" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <path d="M39 18 L53 18 L55 26 L37 26Z" fill="#F5E6C8" opacity="0.95"/>
  <path d="M37 26 L55 26 L56 38 L36 38Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Main mast (taller) -->
  <line x1="28" y1="38" x2="28" y2="8" stroke="#5C4033" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="11" x2="38" y2="11" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="20" x2="39" y2="20" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="29" x2="38" y2="29" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <path d="M19 11 L37 11 L38 20 L18 20Z" fill="#F5E6C8" opacity="0.95"/>
  <path d="M18 20 L38 20 L38 29 L18 29Z" fill="#F5E6C8" opacity="0.95"/>
  <path d="M18 29 L38 29 L38 38 L18 38Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Mizzen mast -->
  <line x1="14" y1="38" x2="14" y2="22" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="28" x2="24" y2="24" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M14 24 L24 25 L24 38 L14 38Z" fill="#F5E6C8" opacity="0.85"/>
</svg>
