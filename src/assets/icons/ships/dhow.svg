<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Waterline -->
  <path d="M4 52 Q18 50 32 52 Q48 54 60 52" stroke="#1a3a5c" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Hull keel - dhow has distinctive curved keel -->
  <path d="M10 48 Q14 53 22 54 L50 54 Q56 53 58 50 Q56 48 54 48 Q32 51 10 48Z" fill="#5C4033"/>
  <!-- Hull main - dhow low freeboard, sharp bow -->
  <path d="M12 40 Q10 44 10 48 Q32 51 58 48 Q59 44 57 40 Q50 37 56 36 Q48 36 20 37 Q14 38 12 40Z" fill="#8B6914"/>
  <!-- Sharp pointed bow (dhow style) -->
  <path d="M54 38 Q58 37 60 40 Q59 44 57 40Z" fill="#8B6914"/>
  <!-- Transom stern -->
  <path d="M10 36 L14 36 L14 48 Q12 47 10 48Z" fill="#5C4033"/>
  <!-- Hull stripe -->
  <path d="M12 40 Q32 38 57 40 L57 41.5 Q32 39.5 12 41.5Z" fill="#D4A547" opacity="0.5"/>
  <!-- Decorative stern carving -->
  <rect x="9" y="37" width="4" height="4" rx="1" fill="#D4A547" opacity="0.7"/>
  <!-- Main mast (raked forward - dhow style) -->
  <line x1="28" y1="40" x2="32" y2="10" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Long lateen yard (dhow characteristic) -->
  <line x1="32" y1="11" x2="12" y2="40" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <!-- Large triangular lateen sail -->
  <path d="M32 12 L12 40 L28 40Z" fill="#F5E6C8" opacity="0.95"/>
  <path d="M32 12 L12 40 L28 40Z" stroke="#D4A547" stroke-width="0.8"/>
  <!-- Sail batten lines -->
  <line x1="26" y1="17" x2="16" y2="35" stroke="#D4A547" stroke-width="0.5" opacity="0.6"/>
  <line x1="29" y1="14" x2="14" y2="37" stroke="#D4A547" stroke-width="0.5" opacity="0.6"/>
  <!-- Small mizzen mast -->
  <line x1="18" y1="40" x2="18" y2="28" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mizzen lateen yard -->
  <line x1="18" y1="29" x2="10" y2="40" stroke="#5C4033" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Mizzen sail -->
  <path d="M18 29 L10 40 L18 40Z" fill="#F5E6C8" opacity="0.8"/>
</svg>
