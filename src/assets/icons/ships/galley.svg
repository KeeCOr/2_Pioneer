<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Waterline -->
  <path d="M2 46 Q16 44 32 46 Q48 48 62 46" stroke="#1a3a5c" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Hull - low and long Mediterranean style -->
  <path d="M5 42 Q8 46 14 47 L52 47 Q58 46 60 42 Q32 45 5 42Z" fill="#5C4033"/>
  <!-- Hull main - sleek and low -->
  <path d="M6 36 Q4 39 5 42 Q32 45 60 42 Q61 39 59 36 Q46 34 18 34 Q10 34 6 36Z" fill="#8B6914"/>
  <!-- Ram bow (rostrum) -->
  <path d="M59 36 L63 38 L62 42 L60 42Z" fill="#D4A547"/>
  <!-- Stern raised deck -->
  <path d="M4 28 L10 28 L10 36 L4 36Z" fill="#8B6914"/>
  <path d="M3 26 L11 26 L11 29 L3 29Z" fill="#D4A547" opacity="0.8"/>
  <!-- Gunwale stripe -->
  <path d="M6 36 Q32 33 59 36 L59 37.5 Q32 34.5 6 37.5Z" fill="#D4A547" opacity="0.5"/>
  <!-- Oars (left bank) -->
  <line x1="14" y1="42" x2="8" y2="50" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="42" x2="14" y2="50" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="42" x2="20" y2="50" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="42" x2="26" y2="50" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="42" x2="32" y2="50" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="42" x2="38" y2="50" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Oar blades -->
  <ellipse cx="7" cy="50.5" rx="2.5" ry="1" fill="#5C4033" transform="rotate(-40 7 50.5)"/>
  <ellipse cx="13" cy="50.5" rx="2.5" ry="1" fill="#5C4033" transform="rotate(-40 13 50.5)"/>
  <ellipse cx="19" cy="50.5" rx="2.5" ry="1" fill="#5C4033" transform="rotate(-40 19 50.5)"/>
  <ellipse cx="25" cy="50.5" rx="2.5" ry="1" fill="#5C4033" transform="rotate(-40 25 50.5)"/>
  <ellipse cx="31" cy="50.5" rx="2.5" ry="1" fill="#5C4033" transform="rotate(-40 31 50.5)"/>
  <ellipse cx="37" cy="50.5" rx="2.5" ry="1" fill="#5C4033" transform="rotate(-40 37 50.5)"/>
  <!-- Single lateen mast -->
  <line x1="30" y1="36" x2="30" y2="14" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lateen yard -->
  <line x1="30" y1="15" x2="14" y2="36" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <!-- Lateen sail -->
  <path d="M30 16 L14 36 L30 36Z" fill="#F5E6C8" opacity="0.9"/>
  <path d="M30 16 L14 36 L30 36Z" stroke="#D4A547" stroke-width="0.8"/>
</svg>
