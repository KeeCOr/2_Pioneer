<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Waterline -->
  <path d="M1 54 Q16 52 32 54 Q48 56 63 54" stroke="#1a3a5c" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Hull keel -->
  <path d="M8 50 Q12 56 20 57 L48 57 Q56 56 58 50 Q32 54 8 50Z" fill="#5C4033"/>
  <!-- Hull main -->
  <path d="M10 40 Q8 45 8 50 Q32 54 58 50 Q59 45 57 40 Q46 37 20 37 Q13 37 10 40Z" fill="#8B6914"/>
  <!-- Pronounced tumblehome -->
  <path d="M10 40 Q32 37.5 57 40 L57 42 Q32 39.5 10 42Z" fill="#D4A547" opacity="0.5"/>
  <!-- Multiple gun ports (galleon characteristic) -->
  <rect x="16" y="42" width="3" height="3" rx="0.4" fill="#5C4033"/>
  <rect x="22" y="42" width="3" height="3" rx="0.4" fill="#5C4033"/>
  <rect x="28" y="42" width="3" height="3" rx="0.4" fill="#5C4033"/>
  <rect x="34" y="42" width="3" height="3" rx="0.4" fill="#5C4033"/>
  <rect x="40" y="42" width="3" height="3" rx="0.4" fill="#5C4033"/>
  <rect x="46" y="42" width="3" height="3" rx="0.4" fill="#5C4033"/>
  <!-- Upper gun deck -->
  <rect x="18" y="38" width="2.5" height="2" rx="0.3" fill="#5C4033"/>
  <rect x="24" y="38" width="2.5" height="2" rx="0.3" fill="#5C4033"/>
  <rect x="30" y="38" width="2.5" height="2" rx="0.3" fill="#5C4033"/>
  <rect x="36" y="38" width="2.5" height="2" rx="0.3" fill="#5C4033"/>
  <rect x="42" y="38" width="2.5" height="2" rx="0.3" fill="#5C4033"/>
  <!-- Ornate stern (galleon hallmark) -->
  <path d="M5 20 L15 20 L15 40 L5 40Z" fill="#8B6914"/>
  <rect x="6" y="22" width="3" height="3" rx="0.5" fill="#D4A547" opacity="0.9"/>
  <rect x="10" y="22" width="3" height="3" rx="0.5" fill="#D4A547" opacity="0.9"/>
  <rect x="6" y="28" width="3" height="3" rx="0.5" fill="#D4A547" opacity="0.8"/>
  <rect x="10" y="28" width="3" height="3" rx="0.5" fill="#D4A547" opacity="0.8"/>
  <rect x="6" y="34" width="3" height="3" rx="0.5" fill="#D4A547" opacity="0.7"/>
  <rect x="10" y="34" width="3" height="3" rx="0.5" fill="#D4A547" opacity="0.7"/>
  <!-- Stern gallery (ornate balcony) -->
  <path d="M4 18 L16 18 L16 21 L4 21Z" fill="#D4A547" opacity="0.9"/>
  <path d="M5 15 L15 15 L15 19 L5 19Z" fill="#8B6914"/>
  <rect x="6" y="16" width="2.5" height="2.5" rx="0.5" fill="#D4A547"/>
  <rect x="9" y="16" width="2.5" height="2.5" rx="0.5" fill="#D4A547"/>
  <rect x="12" y="16" width="2.5" height="2.5" rx="0.5" fill="#D4A547"/>
  <!-- Forecastle -->
  <path d="M52 32 L59 32 L59 40 L52 40Z" fill="#8B6914"/>
  <path d="M51 30 L60 30 L60 33 L51 33Z" fill="#D4A547" opacity="0.7"/>
  <!-- Bowsprit -->
  <line x1="58" y1="37" x2="63" y2="28" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Spritsail yard -->
  <line x1="59" y1="35" x2="63" y2="35" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 4th mast: bonaventure (mizzen) -->
  <line x1="10" y1="40" x2="10" y2="22" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="28" x2="18" y2="24" stroke="#5C4033" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M10 24 L18 25 L18 40 L10 40Z" fill="#F5E6C8" opacity="0.8"/>
  <!-- Mizzen mast -->
  <line x1="20" y1="40" x2="20" y2="20" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="26" x2="32" y2="22" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M20 22 L32 23 L32 40 L20 40Z" fill="#F5E6C8" opacity="0.85"/>
  <!-- Main mast -->
  <line x1="34" y1="40" x2="34" y2="8" stroke="#5C4033" stroke-width="3" stroke-linecap="round"/>
  <line x1="23" y1="11" x2="45" y2="11" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="20" x2="47" y2="20" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="30" x2="46" y2="30" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <path d="M24 11 L44 11 L46 20 L22 20Z" fill="#F5E6C8" opacity="0.95"/>
  <path d="M22 20 L46 20 L46 30 L22 30Z" fill="#F5E6C8" opacity="0.95"/>
  <path d="M22 30 L46 30 L46 40 L22 40Z" fill="#F5E6C8" opacity="0.95"/>
  <!-- Foremast -->
  <line x1="48" y1="40" x2="48" y2="14" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="17" x2="56" y2="17" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39" y1="26" x2="57" y2="26" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <path d="M41 17 L55 17 L56 26 L40 26Z" fill="#F5E6C8" opacity="0.95"/>
  <path d="M40 26 L56 26 L57 40 L39 40Z" fill="#F5E6C8" opacity="0.95"/>
</svg>
