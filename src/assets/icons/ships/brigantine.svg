<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Waterline -->
  <path d="M3 53 Q18 51 32 53 Q46 55 60 53" stroke="#1a3a5c" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Hull keel -->
  <path d="M8 48 Q11 53 18 54 L50 54 Q57 53 58 48 Q32 52 8 48Z" fill="#5C4033"/>
  <!-- Hull main -->
  <path d="M10 40 Q8 44 8 48 Q32 53 58 48 Q58 44 56 40 Q44 37 20 37 Q13 37 10 40Z" fill="#8B6914"/>
  <!-- Decorative hull stripe -->
  <path d="M10 40 Q32 38 56 40 L56 42.5 Q32 40.5 10 42.5Z" fill="#D4A547" opacity="0.6"/>
  <!-- Gunwale -->
  <path d="M10 40 Q32 37 56 40" stroke="#D4A547" stroke-width="1.5"/>
  <!-- Gun ports -->
  <rect x="18" y="41" width="4" height="3" rx="0.5" fill="#5C4033"/>
  <rect x="28" y="41" width="4" height="3" rx="0.5" fill="#5C4033"/>
  <rect x="38" y="41" width="4" height="3" rx="0.5" fill="#5C4033"/>
  <!-- Stern castle with windows -->
  <path d="M8 30 L14 30 L14 40 L8 40Z" fill="#8B6914"/>
  <rect x="9" y="32" width="3" height="3" rx="0.5" fill="#D4A547" opacity="0.7"/>
  <path d="M8 28 L15 28 L15 31 L8 31Z" fill="#D4A547" opacity="0.6"/>
  <!-- Bowsprit -->
  <line x1="56" y1="39" x2="63" y2="32" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Foremast (square rigged) -->
  <line x1="44" y1="40" x2="44" y2="13" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fore topsail yard -->
  <line x1="36" y1="16" x2="52" y2="16" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Fore lower yard -->
  <line x1="34" y1="25" x2="54" y2="25" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <!-- Fore topsail -->
  <path d="M37 16 L51 16 L52 25 L36 25Z" fill="#F5E6C8" opacity="0.95"/>
  <path d="M37 16 L51 16 L52 25 L36 25Z" stroke="#D4A547" stroke-width="0.7"/>
  <!-- Fore lower sail -->
  <path d="M35 25 L53 25 L54 40 L34 40Z" fill="#F5E6C8" opacity="0.95"/>
  <path d="M35 25 L53 25 L54 40 L34 40Z" stroke="#D4A547" stroke-width="0.7"/>
  <!-- Main mast (fore-and-aft) -->
  <line x1="24" y1="40" x2="24" y2="10" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Gaff -->
  <line x1="24" y1="20" x2="38" y2="16" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Boom -->
  <line x1="24" y1="38" x2="40" y2="38" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Main fore-and-aft sail -->
  <path d="M24 12 L38 17 L40 38 L24 38Z" fill="#F5E6C8" opacity="0.9"/>
  <path d="M24 12 L38 17 L40 38 L24 38Z" stroke="#D4A547" stroke-width="0.7"/>
  <!-- Jib -->
  <path d="M24 14 L63 32 L56 39Z" fill="#F5E6C8" opacity="0.75"/>
</svg>
