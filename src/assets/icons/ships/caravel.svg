<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Waterline -->
  <path d="M3 52 Q18 50 32 52 Q46 54 60 52" stroke="#1a3a5c" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Hull keel/bottom -->
  <path d="M8 48 Q10 52 16 53 L50 53 Q56 52 57 48 Q32 52 8 48Z" fill="#5C4033"/>
  <!-- Hull main -->
  <path d="M10 40 Q8 44 8 48 Q32 52 57 48 Q57 44 55 40 Q44 37 20 37 Q13 37 10 40Z" fill="#8B6914"/>
  <!-- Hull band -->
  <path d="M10 40 Q32 38 55 40 L55 42 Q32 40 10 42Z" fill="#D4A547" opacity="0.5"/>
  <!-- Gunwale -->
  <path d="M10 40 Q32 37 55 40" stroke="#D4A547" stroke-width="1.5"/>
  <!-- Bowsprit -->
  <line x1="55" y1="40" x2="62" y2="33" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <!-- Stern castle -->
  <path d="M8 32 L14 32 L14 40 L8 40Z" fill="#8B6914"/>
  <path d="M8 30 L14 30 L14 33 L8 33Z" fill="#D4A547" opacity="0.8"/>
  <!-- Fore mast -->
  <line x1="44" y1="40" x2="44" y2="14" stroke="#5C4033" stroke-width="2" stroke-linecap="round"/>
  <!-- Main mast -->
  <line x1="26" y1="40" x2="26" y2="10" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Main lateen sail -->
  <path d="M26 12 L10 38 L26 40Z" fill="#F5E6C8" opacity="0.95"/>
  <path d="M26 12 L10 38 L26 40Z" stroke="#D4A547" stroke-width="0.8"/>
  <!-- Main lateen yard -->
  <line x1="26" y1="12" x2="10" y2="38" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Fore lateen sail -->
  <path d="M44 15 L30 38 L44 40Z" fill="#F5E6C8" opacity="0.9"/>
  <path d="M44 15 L30 38 L44 40Z" stroke="#D4A547" stroke-width="0.7"/>
  <!-- Fore lateen yard -->
  <line x1="44" y1="15" x2="30" y2="38" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Jib -->
  <path d="M26 14 L62 33 L55 40Z" fill="#F5E6C8" opacity="0.7"/>
</svg>
