<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Wool ball/sack -->
  <defs>
    <radialGradient id="woolGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#F0E8D0;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#D8C8A0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A89060;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="18" ry="4" fill="rgba(0,0,0,0.2)"/>
  <!-- Wool sack main body -->
  <ellipse cx="32" cy="36" rx="20" ry="18" fill="url(#woolGrad)"/>
  <!-- Fluffy wool texture bumps (outer edge) -->
  <circle cx="14" cy="32" r="4" fill="#F0E8D0"/>
  <circle cx="12" cy="38" r="4.5" fill="#EAE0C8"/>
  <circle cx="15" cy="44" r="4" fill="#F0E8D0"/>
  <circle cx="20" cy="50" r="4" fill="#EAE0C8"/>
  <circle cx="28" cy="54" r="4.5" fill="#F0E8D0"/>
  <circle cx="36" cy="54" r="4" fill="#EAE0C8"/>
  <circle cx="44" cy="51" r="4" fill="#F0E8D0"/>
  <circle cx="50" cy="45" r="4" fill="#EAE0C8"/>
  <circle cx="52" cy="38" r="4.5" fill="#F0E8D0"/>
  <circle cx="50" cy="32" r="4" fill="#EAE0C8"/>
  <circle cx="47" cy="26" r="3.5" fill="#F0E8D0"/>
  <circle cx="40" cy="20" r="4" fill="#EAE0C8"/>
  <circle cx="32" cy="18" r="4.5" fill="#F0E8D0"/>
  <circle cx="24" cy="20" r="4" fill="#EAE0C8"/>
  <circle cx="17" cy="26" r="3.5" fill="#F0E8D0"/>
  <!-- Inner fluffy texture -->
  <circle cx="24" cy="30" r="5" fill="#F5EDD8" opacity="0.7"/>
  <circle cx="36" cy="28" r="5" fill="#EDE4C4" opacity="0.7"/>
  <circle cx="30" cy="40" r="6" fill="#F5EDD8" opacity="0.7"/>
  <circle cx="42" cy="38" r="5" fill="#EDE4C4" opacity="0.7"/>
  <circle cx="22" cy="42" r="4.5" fill="#F5EDD8" opacity="0.6"/>
  <!-- Wool yarn spiral/thread visible -->
  <path d="M28 30 C30 26 36 26 38 30 C40 34 38 40 34 42 C30 44 26 42 24 38 C22 34 24 30 28 30" fill="none" stroke="#C8B080" stroke-width="1.5" opacity="0.5"/>
  <path d="M30 26 C32 22 38 22 40 26" fill="none" stroke="#C8B080" stroke-width="1.2" opacity="0.4"/>
  <!-- Tie at top of sack -->
  <path d="M26 20 C28 16 30 14 32 14 C34 14 36 16 38 20" fill="none" stroke="#D4A547" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Knot -->
  <circle cx="32" cy="13" r="3" fill="#C8940A"/>
  <circle cx="32" cy="13" r="1.8" fill="#D4A547"/>
  <!-- Curly top tufts -->
  <path d="M28 14 C26 10 24 8 26 6" fill="none" stroke="#F0E8D0" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 12 C32 8 32 6 34 5" fill="none" stroke="#E8DEC0" stroke-width="2" stroke-linecap="round"/>
  <path d="M36 14 C38 10 40 8 38 6" fill="none" stroke="#F0E8D0" stroke-width="2" stroke-linecap="round"/>
  <!-- Gold tag -->
  <rect x="38" y="10" width="10" height="7" rx="1.5" fill="#D4A547"/>
  <rect x="39" y="11" width="8" height="5" rx="1" fill="#8B6914" opacity="0.4"/>
  <line x1="43" y1="10" x2="43" y2="7" stroke="#D4A547" stroke-width="1.5"/>
</svg>
