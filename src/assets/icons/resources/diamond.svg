<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cut diamond gemstone -->
  <defs>
    <linearGradient id="diamondTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F8FF;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#A8DCFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#60B8F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="diamondLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5090D0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#80C0F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="diamondRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A0D0F8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4878B8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="4" fill="rgba(0,0,0,0.18)"/>
  <!-- Diamond outline glow -->
  <polygon points="32,6 52,24 32,58 12,24" fill="none" stroke="#A8DCFF" stroke-width="1.5" opacity="0.5"/>
  <!-- Crown (top section) - girdle line at y=24 -->
  <!-- Table facet (top flat) -->
  <polygon points="32,10 46,22 18,22" fill="url(#diamondTop)"/>
  <!-- Crown left facets -->
  <polygon points="32,10 18,22 14,26" fill="#7BBCE8"/>
  <polygon points="32,10 14,26 22,22" fill="#C0E4FF"/>
  <!-- Crown right facets -->
  <polygon points="32,10 46,22 50,26" fill="#5898D0"/>
  <polygon points="32,10 50,26 42,22" fill="#B0D8F8"/>
  <!-- Girdle (middle band) -->
  <polygon points="12,24 18,22 46,22 52,24 46,26 18,26" fill="#D4ECFF"/>
  <!-- Pavilion (bottom section) -->
  <!-- Left pavilion facets -->
  <polygon points="12,24 18,26 32,56" fill="url(#diamondLeft)"/>
  <polygon points="12,24 18,26 24,38" fill="#4880C0"/>
  <polygon points="18,26 32,56 24,38" fill="#6AAAE0"/>
  <!-- Right pavilion facets -->
  <polygon points="52,24 46,26 32,56" fill="url(#diamondRight)"/>
  <polygon points="52,24 46,26 40,38" fill="#90C8F4"/>
  <polygon points="46,26 32,56 40,38" fill="#70AEE0"/>
  <!-- Center pavilion -->
  <polygon points="18,26 46,26 32,56" fill="#88C0F0" opacity="0.7"/>
  <polygon points="18,26 46,26 32,42" fill="#A8D8FF" opacity="0.5"/>
  <!-- Sparkle/light reflections -->
  <line x1="32" y1="10" x2="32" y2="16" stroke="white" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  <line x1="28" y1="12" x2="30" y2="15" stroke="white" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="36" y1="12" x2="34" y2="15" stroke="white" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <!-- Gold setting/frame accent at girdle -->
  <polygon points="12,24 18,22 46,22 52,24 46,26 18,26" fill="none" stroke="#D4A547" stroke-width="1.2"/>
  <!-- Prism sparkle top right -->
  <path d="M48 14 L52 10 M50 16 L54 14 M46 12 L50 8" stroke="#FFE080" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
