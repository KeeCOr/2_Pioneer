<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rice sack -->
  <defs>
    <linearGradient id="riceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5EFD8;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#E8DCBC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8B888;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="riceShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B7040;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#8B7040;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#8B7040;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="32" cy="57" rx="19" ry="4" fill="rgba(0,0,0,0.22)"/>
  <!-- Sack body (bulging burlap sack) -->
  <path d="M16 52 C11 52 9 44 10 36 C11 28 13 20 17 16 L47 16 C51 20 53 28 54 36 C55 44 53 52 48 52 Z" fill="url(#riceGrad)"/>
  <!-- Burlap weave texture -->
  <path d="M16 52 C11 52 9 44 10 36 C11 28 13 20 17 16 L47 16 C51 20 53 28 54 36 C55 44 53 52 48 52 Z" fill="url(#riceShadow)"/>
  <!-- Horizontal weave lines -->
  <path d="M12 22 C16 21 24 20 32 20 C40 20 48 21 52 22" fill="none" stroke="#B8A870" stroke-width="0.8" opacity="0.5"/>
  <path d="M11 28 C15 27 24 26 32 26 C40 26 49 27 53 28" fill="none" stroke="#B8A870" stroke-width="0.8" opacity="0.5"/>
  <path d="M10 34 C14 33 24 32 32 32 C40 32 50 33 54 34" fill="none" stroke="#B8A870" stroke-width="0.8" opacity="0.5"/>
  <path d="M10 40 C14 39 24 38 32 38 C40 38 50 39 54 40" fill="none" stroke="#B8A870" stroke-width="0.8" opacity="0.5"/>
  <path d="M11 46 C15 45 24 44 32 44 C40 44 49 45 53 46" fill="none" stroke="#B8A870" stroke-width="0.8" opacity="0.5"/>
  <!-- Vertical weave lines -->
  <path d="M20 16 C19 24 19 40 20 52" fill="none" stroke="#C8B880" stroke-width="0.8" opacity="0.4"/>
  <path d="M26 16 C25 24 25 40 26 52" fill="none" stroke="#C8B880" stroke-width="0.8" opacity="0.4"/>
  <path d="M32 16 C32 24 32 40 32 52" fill="none" stroke="#C8B880" stroke-width="0.8" opacity="0.4"/>
  <path d="M38 16 C39 24 39 40 38 52" fill="none" stroke="#C8B880" stroke-width="0.8" opacity="0.4"/>
  <path d="M44 16 C45 24 45 40 44 52" fill="none" stroke="#C8B880" stroke-width="0.8" opacity="0.4"/>
  <!-- Sack neck/top -->
  <path d="M20 16 C20 10 24 7 32 7 C40 7 44 10 44 16" fill="#D8CC98"/>
  <path d="M20 16 C20 10 24 7 32 7 C40 7 44 10 44 16" fill="none" stroke="#B8A870" stroke-width="1"/>
  <!-- Twine tie at neck -->
  <path d="M22 12 C26 9 38 9 42 12" fill="none" stroke="#D4A547" stroke-width="3" stroke-linecap="round"/>
  <path d="M26 10 L30 7 M38 10 L34 7" stroke="#D4A547" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- Tie bow knot -->
  <path d="M29 8 C30 6 34 6 35 8" fill="none" stroke="#C8940A" stroke-width="2" stroke-linecap="round"/>
  <!-- Scattered rice grains at base (spilling) -->
  <ellipse cx="18" cy="53" rx="2" ry="1" fill="#F5EFD8" transform="rotate(-20 18 53)"/>
  <ellipse cx="22" cy="55" rx="2" ry="1" fill="#EDE4C4" transform="rotate(10 22 55)"/>
  <ellipse cx="28" cy="56" rx="2" ry="1" fill="#F5EFD8" transform="rotate(-5 28 56)"/>
  <ellipse cx="36" cy="56" rx="2" ry="1" fill="#EDE4C4" transform="rotate(15 36 56)"/>
  <ellipse cx="42" cy="55" rx="2" ry="1" fill="#F5EFD8" transform="rotate(-10 42 55)"/>
  <ellipse cx="46" cy="53" rx="2" ry="1" fill="#EDE4C4" transform="rotate(20 46 53)"/>
  <!-- Kanji/stamp on sack (decorative) -->
  <rect x="24" y="28" width="16" height="16" rx="2" fill="none" stroke="#D4A547" stroke-width="1.5"/>
  <!-- Rice symbol inside stamp -->
  <path d="M32 30 L32 42" stroke="#D4A547" stroke-width="1.2" opacity="0.7"/>
  <path d="M27 33 L37 33" stroke="#D4A547" stroke-width="1.2" opacity="0.7"/>
  <path d="M27 37 L37 37" stroke="#D4A547" stroke-width="1.2" opacity="0.7"/>
  <path d="M28 30 L32 33 L36 30" fill="none" stroke="#D4A547" stroke-width="1" opacity="0.7"/>
</svg>
