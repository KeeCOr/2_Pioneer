<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Silk fabric bolt -->
  <defs>
    <linearGradient id="silkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B2E8E;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#C44AB0;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#A8369E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6A1A60;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="silkSheen1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.4"/>
      <stop offset="40%" style="stop-color:white;stop-opacity:0"/>
      <stop offset="70%" style="stop-color:white;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="endcapGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7A1E70;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#C44AB0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7A1E70;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="20" ry="4" fill="rgba(0,0,0,0.2)"/>
  <!-- Main bolt body (rolled fabric cylinder lying horizontally) -->
  <!-- End cap left -->
  <ellipse cx="14" cy="35" rx="5" ry="18" fill="url(#endcapGrad)"/>
  <!-- Main cylinder body -->
  <rect x="14" y="17" width="36" height="36" fill="url(#silkGrad)" rx="1"/>
  <!-- Fabric layers on cylinder (rolled look) -->
  <path d="M14 21 L50 21" stroke="#6A1A60" stroke-width="1" opacity="0.5"/>
  <path d="M14 25 L50 25" stroke="#C44AB0" stroke-width="0.8" opacity="0.4"/>
  <path d="M14 29 L50 29" stroke="#6A1A60" stroke-width="1" opacity="0.5"/>
  <path d="M14 33 L50 33" stroke="#C44AB0" stroke-width="0.8" opacity="0.4"/>
  <path d="M14 37 L50 37" stroke="#6A1A60" stroke-width="1" opacity="0.5"/>
  <path d="M14 41 L50 41" stroke="#C44AB0" stroke-width="0.8" opacity="0.4"/>
  <path d="M14 45 L50 45" stroke="#6A1A60" stroke-width="1" opacity="0.5"/>
  <path d="M14 49 L50 49" stroke="#C44AB0" stroke-width="0.8" opacity="0.4"/>
  <!-- Sheen highlight -->
  <rect x="14" y="17" width="36" height="36" fill="url(#silkSheen1)" rx="1"/>
  <!-- Diagonal sheen streaks (silk effect) -->
  <path d="M20 17 L50 38" stroke="white" stroke-width="3" opacity="0.12" stroke-linecap="round"/>
  <path d="M28 17 L50 30" stroke="white" stroke-width="2" opacity="0.1" stroke-linecap="round"/>
  <!-- End cap right -->
  <ellipse cx="50" cy="35" rx="5" ry="18" fill="url(#endcapGrad)"/>
  <ellipse cx="50" cy="35" rx="4" ry="17" fill="none" stroke="#D4A547" stroke-width="1"/>
  <!-- End cap left border -->
  <ellipse cx="14" cy="35" rx="5" ry="18" fill="none" stroke="#D4A547" stroke-width="1"/>
  <!-- Gold band/ribbon around bolt -->
  <rect x="28" y="17" width="8" height="36" fill="none" stroke="#D4A547" stroke-width="2"/>
  <rect x="29" y="17" width="6" height="36" fill="#D4A547" opacity="0.25"/>
  <!-- Rod/dowel ends -->
  <ellipse cx="14" cy="35" rx="2.5" ry="2.5" fill="#8B6914"/>
  <ellipse cx="50" cy="35" rx="2.5" ry="2.5" fill="#8B6914"/>
  <ellipse cx="14" cy="35" rx="1.2" ry="1.2" fill="#D4A547"/>
  <ellipse cx="50" cy="35" rx="1.2" ry="1.2" fill="#D4A547"/>
</svg>
