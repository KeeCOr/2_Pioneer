<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Spice sack with colorful powder -->
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="18" ry="4" fill="rgba(0,0,0,0.2)"/>
  <!-- Sack body -->
  <path d="M18 52 C14 52 12 46 13 38 C14 30 16 22 20 18 L44 18 C48 22 50 30 51 38 C52 46 50 52 46 52 Z" fill="#C8860A"/>
  <path d="M18 52 C14 52 12 46 13 38 C14 30 16 22 20 18 L44 18 C48 22 50 30 51 38 C52 46 50 52 46 52 Z" fill="url(#spiceBag)"/>
  <!-- Sack neck/tie -->
  <path d="M22 18 C22 12 24 8 32 8 C40 8 42 12 42 18" fill="none" stroke="#8B5E0A" stroke-width="2"/>
  <ellipse cx="32" cy="18" rx="10" ry="3" fill="#A06820"/>
  <!-- Twine tie -->
  <path d="M26 14 C28 11 36 11 38 14" fill="none" stroke="#D4A547" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Colorful spice powder spilling at top -->
  <ellipse cx="32" cy="18" rx="8" ry="2.5" fill="#E8521A"/>
  <!-- Spice powder dots/spill -->
  <circle cx="24" cy="16" r="2" fill="#E8521A" opacity="0.8"/>
  <circle cx="28" cy="14" r="1.5" fill="#F4A020" opacity="0.9"/>
  <circle cx="32" cy="13" r="2" fill="#CC3A10" opacity="0.85"/>
  <circle cx="36" cy="14" r="1.5" fill="#E8521A" opacity="0.8"/>
  <circle cx="40" cy="16" r="2" fill="#F4A020" opacity="0.7"/>
  <!-- Sack shading/fold lines -->
  <path d="M24 24 C22 32 22 42 23 50" fill="none" stroke="#8B5E0A" stroke-width="1.5" opacity="0.5"/>
  <path d="M40 24 C42 32 42 42 41 50" fill="none" stroke="#8B5E0A" stroke-width="1.5" opacity="0.5"/>
  <!-- Gold accent border at bottom -->
  <path d="M18 52 L46 52" stroke="#D4A547" stroke-width="1.5" stroke-linecap="round"/>
  <defs>
    <linearGradient id="spiceBag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4940C;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#8B5E0A;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#5A3A00;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
</svg>
