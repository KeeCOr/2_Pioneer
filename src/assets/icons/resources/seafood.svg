<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fish (seafood) -->
  <defs>
    <linearGradient id="fishGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A6080;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#2A90B8;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#1E78A0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0E4860;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fishBelly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A90B8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8D8A0;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="20" ry="3.5" fill="rgba(0,0,0,0.2)"/>
  <!-- Fish tail -->
  <path d="M50 32 L60 22 L58 32 L60 42 Z" fill="#1A6080"/>
  <path d="M50 32 L60 22 L58 32 L60 42 Z" fill="url(#fishGrad)" opacity="0.8"/>
  <!-- Tail fin lines -->
  <path d="M50 32 L60 22" stroke="#0E4860" stroke-width="1" opacity="0.6"/>
  <path d="M50 32 L60 42" stroke="#0E4860" stroke-width="1" opacity="0.6"/>
  <path d="M54 27 L57 31" stroke="#0E4860" stroke-width="0.8" opacity="0.4"/>
  <path d="M54 37 L57 33" stroke="#0E4860" stroke-width="0.8" opacity="0.4"/>
  <!-- Fish body -->
  <ellipse cx="30" cy="32" rx="22" ry="13" fill="url(#fishGrad)"/>
  <!-- Belly (lighter underside) -->
  <path d="M10 32 C10 36 14 44 30 44 C46 44 50 36 50 32" fill="#C8B890" opacity="0.5"/>
  <!-- Dorsal fin -->
  <path d="M22 20 C24 14 30 12 36 14 C34 18 30 19 26 19" fill="#1A6080"/>
  <path d="M22 20 C24 14 30 12 36 14" fill="none" stroke="#0E4860" stroke-width="1"/>
  <!-- Dorsal fin rays -->
  <path d="M24 19 L25 14" stroke="#0E4860" stroke-width="0.8" opacity="0.5"/>
  <path d="M27 18 L29 13" stroke="#0E4860" stroke-width="0.8" opacity="0.5"/>
  <path d="M30 18 L32 13" stroke="#0E4860" stroke-width="0.8" opacity="0.5"/>
  <path d="M33 18 L35 14" stroke="#0E4860" stroke-width="0.8" opacity="0.5"/>
  <!-- Pectoral fin -->
  <path d="M25 34 C20 36 18 40 22 42 C26 42 28 38 28 35" fill="#1E78A0"/>
  <!-- Scale pattern -->
  <path d="M20 27 C22 25 26 26 24 28" fill="none" stroke="#2A90B8" stroke-width="1" opacity="0.5"/>
  <path d="M28 25 C30 23 34 24 32 26" fill="none" stroke="#2A90B8" stroke-width="1" opacity="0.5"/>
  <path d="M36 26 C38 24 42 25 40 27" fill="none" stroke="#2A90B8" stroke-width="1" opacity="0.5"/>
  <path d="M24 31 C26 29 30 30 28 32" fill="none" stroke="#2A90B8" stroke-width="1" opacity="0.4"/>
  <path d="M32 29 C34 27 38 28 36 30" fill="none" stroke="#2A90B8" stroke-width="1" opacity="0.4"/>
  <path d="M16 31 C18 29 22 30 20 32" fill="none" stroke="#2A90B8" stroke-width="1" opacity="0.4"/>
  <!-- Eye -->
  <circle cx="12" cy="30" r="4" fill="#E8D8A0"/>
  <circle cx="12" cy="30" r="2.5" fill="#1A1A1A"/>
  <circle cx="11" cy="29" r="1" fill="white"/>
  <!-- Mouth -->
  <path d="M8 33 C9 35 10 34 9 33" fill="none" stroke="#0E4860" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Shine on body -->
  <ellipse cx="26" cy="26" rx="6" ry="3" fill="white" opacity="0.15" transform="rotate(-20 26 26)"/>
  <!-- Gold accent lines (like scales catching light) -->
  <path d="M30 22 C34 21 38 22 40 24" stroke="#D4A547" stroke-width="1" opacity="0.5" fill="none"/>
</svg>
