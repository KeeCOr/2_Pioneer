<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ornate ceramic vase -->
  <defs>
    <linearGradient id="vaseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A6B8A;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#2A9EBF;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#1E7FA0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0F4A60;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="vaseShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0"/>
      <stop offset="35%" style="stop-color:white;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="14" ry="3" fill="rgba(0,0,0,0.2)"/>
  <!-- Vase body -->
  <path d="M20 52 C16 52 14 46 15 38 C16 30 20 22 22 18 C24 14 26 12 32 12 C38 12 40 14 42 18 C44 22 48 30 49 38 C50 46 48 52 44 52 Z" fill="url(#vaseGrad)"/>
  <!-- Vase neck -->
  <rect x="26" y="8" width="12" height="8" rx="3" fill="#1A6B8A"/>
  <!-- Vase rim -->
  <ellipse cx="32" cy="8" rx="8" ry="2.5" fill="#2A9EBF"/>
  <ellipse cx="32" cy="8" rx="6" ry="1.5" fill="#1A6B8A"/>
  <!-- Decorative band top -->
  <path d="M22 20 C24 19 28 18 32 18 C36 18 40 19 42 20" fill="none" stroke="#D4A547" stroke-width="2"/>
  <!-- Decorative middle band -->
  <path d="M16 36 C18 35 24 34 32 34 C40 34 46 35 48 36" fill="none" stroke="#D4A547" stroke-width="1.5"/>
  <!-- Decorative bottom band -->
  <path d="M18 48 C20 47.5 26 47 32 47 C38 47 44 47.5 46 48" fill="none" stroke="#D4A547" stroke-width="2"/>
  <!-- Floral pattern on body -->
  <circle cx="32" cy="30" r="5" fill="none" stroke="#D4A547" stroke-width="1.2"/>
  <circle cx="32" cy="30" r="2" fill="#D4A547" opacity="0.7"/>
  <!-- Petals -->
  <ellipse cx="32" cy="24" rx="1.5" ry="2" fill="#D4A547" opacity="0.6"/>
  <ellipse cx="32" cy="36" rx="1.5" ry="2" fill="#D4A547" opacity="0.6"/>
  <ellipse cx="26" cy="30" rx="2" ry="1.5" fill="#D4A547" opacity="0.6"/>
  <ellipse cx="38" cy="30" rx="2" ry="1.5" fill="#D4A547" opacity="0.6"/>
  <!-- Handles -->
  <path d="M22 26 C18 26 16 30 18 34 C19 36 21 37 22 36" fill="none" stroke="#0F4A60" stroke-width="3" stroke-linecap="round"/>
  <path d="M42 26 C46 26 48 30 46 34 C45 36 43 37 42 36" fill="none" stroke="#0F4A60" stroke-width="3" stroke-linecap="round"/>
  <path d="M22 26 C18 26 16 30 18 34 C19 36 21 37 22 36" fill="none" stroke="#2A9EBF" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M42 26 C46 26 48 30 46 34 C45 36 43 37 42 36" fill="none" stroke="#2A9EBF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Shine -->
  <path d="M22 18 C22 16 24 14 26 14 C27 16 27 24 26 36" fill="url(#vaseShine)"/>
  <!-- Base -->
  <ellipse cx="32" cy="52" rx="12" ry="2.5" fill="#0F4A60"/>
  <path d="M20 52 L44 52" stroke="#D4A547" stroke-width="1.5"/>
</svg>
