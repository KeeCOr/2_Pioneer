<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Fog layers - horizontal bands fading in/out -->
  <rect x="10" y="14" width="44" height="5" rx="2.5" fill="#94A3B8" opacity="0.5"/>
  <rect x="6" y="23" width="52" height="5" rx="2.5" fill="#94A3B8" opacity="0.7"/>
  <rect x="10" y="32" width="44" height="5" rx="2.5" fill="#94A3B8" opacity="0.8"/>
  <rect x="6" y="41" width="52" height="5" rx="2.5" fill="#94A3B8" opacity="0.6"/>
  <rect x="12" y="50" width="40" height="5" rx="2.5" fill="#94A3B8" opacity="0.4"/>
  <!-- Soft gradient overlays to simulate mist -->
  <ellipse cx="20" cy="28" rx="14" ry="6" fill="#E2E8F0" opacity="0.25"/>
  <ellipse cx="44" cy="38" rx="14" ry="6" fill="#E2E8F0" opacity="0.2"/>
</svg>
