<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Pirate - Skull and crossbones on flag -->
  <!-- Flag/banner background -->
  <rect x="8" y="8" width="48" height="38" rx="3" fill="#1F2937"/>
  <!-- Flag pole -->
  <rect x="5" y="5" width="3" height="54" rx="1.5" fill="#374151"/>
  <!-- Flag border -->
  <rect x="8" y="8" width="48" height="38" rx="3" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Skull - cranium -->
  <ellipse cx="36" cy="24" rx="11" ry="10" fill="#f9fafb"/>
  <!-- Skull - jaw -->
  <path d="M25 29 Q28 36 36 37 Q44 36 47 29 L45 29 Q43 34 36 35 Q29 34 27 29 Z" fill="#f9fafb"/>
  <!-- Jaw bone segments -->
  <rect x="29" y="32" width="2.5" height="5" rx="0.5" fill="#1F2937"/>
  <rect x="34" y="33" width="2.5" height="5" rx="0.5" fill="#1F2937"/>
  <rect x="39" y="32" width="2.5" height="5" rx="0.5" fill="#1F2937"/>
  <!-- Skull - eye sockets -->
  <ellipse cx="31" cy="23" rx="4" ry="4.5" fill="#1F2937"/>
  <ellipse cx="41" cy="23" rx="4" ry="4.5" fill="#1F2937"/>
  <!-- Nose cavity -->
  <path d="M34.5 28 Q36 30 37.5 28 Q36 26 34.5 28 Z" fill="#1F2937"/>
  <!-- Skull temple lines -->
  <path d="M25.5 20 Q26 17 28 16" fill="none" stroke="#d1d5db" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <!-- Crossbones -->
  <!-- Left bone (bottom-left to top-right diagonal) -->
  <line x1="14" y1="44" x2="22" y2="36" stroke="#f9fafb" stroke-width="4" stroke-linecap="round"/>
  <!-- Left bone knuckles -->
  <circle cx="13" cy="45" r="4" fill="#f9fafb"/>
  <circle cx="23" cy="35" r="4" fill="#f9fafb"/>
  <!-- Right bone (bottom-right to top-left diagonal) -->
  <line x1="50" y1="44" x2="42" y2="36" stroke="#f9fafb" stroke-width="4" stroke-linecap="round"/>
  <!-- Right bone knuckles -->
  <circle cx="51" cy="45" r="4" fill="#f9fafb"/>
  <circle cx="41" cy="35" r="4" fill="#f9fafb"/>
  <!-- Red eyes in sockets -->
  <circle cx="31" cy="23" r="2" fill="#EF4444"/>
  <circle cx="41" cy="23" r="2" fill="#EF4444"/>
  <!-- Red shine on eyes -->
  <circle cx="30" cy="22" r="0.7" fill="#fca5a5"/>
  <circle cx="40" cy="22" r="0.7" fill="#fca5a5"/>
  <!-- Flag wave edge detail -->
  <path d="M56 8 Q60 14 56 20 Q60 26 56 32 Q60 38 56 46" fill="none" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
</svg>
