<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Treasure Chest with gold coins spilling out -->
  <!-- Chest shadow -->
  <ellipse cx="32" cy="58" rx="22" ry="4" fill="#6b3410" opacity="0.4"/>
  <!-- Chest base/body -->
  <rect x="10" y="36" width="44" height="22" rx="3" fill="#8B4513"/>
  <!-- Chest body wood planks -->
  <line x1="10" y1="43" x2="54" y2="43" stroke="#6b3410" stroke-width="1.2" opacity="0.6"/>
  <line x1="10" y1="50" x2="54" y2="50" stroke="#6b3410" stroke-width="1.2" opacity="0.6"/>
  <!-- Chest metal straps vertical -->
  <rect x="18" y="36" width="3" height="22" rx="0.5" fill="#78350f" opacity="0.7"/>
  <rect x="43" y="36" width="3" height="22" rx="0.5" fill="#78350f" opacity="0.7"/>
  <!-- Chest lid -->
  <path d="M10 36 Q10 24 32 22 Q54 24 54 36 Z" fill="#a16207"/>
  <!-- Lid top arch highlight -->
  <path d="M14 36 Q14 27 32 25 Q50 27 50 36" fill="none" stroke="#ca8a04" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lid wood lines -->
  <path d="M14 32 Q32 30 50 32" fill="none" stroke="#78350f" stroke-width="1" opacity="0.5"/>
  <path d="M12 35 Q32 33 52 35" fill="none" stroke="#78350f" stroke-width="1" opacity="0.5"/>
  <!-- Metal band on lid -->
  <path d="M10 34 Q10 32 32 31 Q54 32 54 34" fill="none" stroke="#d4a547" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Front metal band/latch -->
  <rect x="26" y="34" width="12" height="4" rx="1" fill="#D4A547"/>
  <rect x="29" y="35.5" width="6" height="2" rx="0.5" fill="#92400e"/>
  <!-- Keyhole -->
  <circle cx="32" cy="36.5" r="1.8" fill="#92400e"/>
  <rect x="31" y="37.5" width="2" height="2.5" rx="0.3" fill="#92400e"/>
  <!-- Corner metal pieces on body -->
  <rect x="10" y="36" width="4" height="4" rx="0.5" fill="#D4A547"/>
  <rect x="50" y="36" width="4" height="4" rx="0.5" fill="#D4A547"/>
  <rect x="10" y="54" width="4" height="4" rx="0.5" fill="#D4A547"/>
  <rect x="50" y="54" width="4" height="4" rx="0.5" fill="#D4A547"/>
  <!-- Gold coins spilling out front -->
  <!-- Coin pile -->
  <ellipse cx="32" cy="40" rx="14" ry="5" fill="#D4A547"/>
  <ellipse cx="32" cy="39" rx="14" ry="5" fill="#FBBF24"/>
  <!-- Individual coins scattered -->
  <ellipse cx="18" cy="44" rx="4" ry="2.5" fill="#D4A547"/>
  <ellipse cx="18" cy="43.5" rx="4" ry="2.5" fill="#FBBF24"/>
  <ellipse cx="46" cy="44" rx="4" ry="2.5" fill="#D4A547"/>
  <ellipse cx="46" cy="43.5" rx="4" ry="2.5" fill="#FBBF24"/>
  <ellipse cx="12" cy="50" rx="3.5" ry="2" fill="#D4A547"/>
  <ellipse cx="12" cy="49.5" rx="3.5" ry="2" fill="#FBBF24"/>
  <ellipse cx="52" cy="50" rx="3.5" ry="2" fill="#D4A547"/>
  <ellipse cx="52" cy="49.5" rx="3.5" ry="2" fill="#FBBF24"/>
  <!-- Coin edge markings -->
  <path d="M20 38.5 Q24 37.5 28 38.5" fill="none" stroke="#92400e" stroke-width="0.6" opacity="0.6"/>
  <!-- Gems on chest -->
  <path d="M22 30 L24 27 L26 30 L24 32 Z" fill="#ef4444"/>
  <path d="M38 30 L40 27 L42 30 L40 32 Z" fill="#10b981"/>
  <!-- Sparkle effects -->
  <path d="M8 24 L9 22 L10 24 L9 26 Z" fill="#fde68a" opacity="0.8"/>
  <path d="M54 20 L55.5 18 L57 20 L55.5 22 Z" fill="#fde68a" opacity="0.8"/>
  <path d="M32 15 L33 13 L34 15 L33 17 Z" fill="#fde68a" opacity="0.9"/>
  <circle cx="6" cy="32" r="1.5" fill="#fde68a" opacity="0.6"/>
  <circle cx="58" cy="28" r="1.5" fill="#fde68a" opacity="0.6"/>
</svg>
