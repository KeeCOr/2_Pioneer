<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Flotsam - floating debris/driftwood on water -->
  <!-- Water surface waves background -->
  <path d="M4 44 Q10 40 16 44 Q22 48 28 44 Q34 40 40 44 Q46 48 52 44 Q58 40 62 44 L62 58 L4 58 Z" fill="#1e40af" opacity="0.3"/>
  <!-- Main large driftwood log (tilted) -->
  <path d="M10 40 Q20 34 36 38 Q44 40 48 44 Q38 50 22 46 Q14 44 10 40 Z" fill="#8B6914"/>
  <!-- Log texture grain lines -->
  <path d="M14 38.5 Q24 33.5 38 37.5" fill="none" stroke="#6b4f0f" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M13 41 Q22 36 36 40" fill="none" stroke="#6b4f0f" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <!-- Bark notch detail -->
  <path d="M28 35.5 Q30 34 32 35.5 Q30 37 28 35.5 Z" fill="#6b4f0f"/>
  <!-- Broken end left -->
  <path d="M10 40 Q7 38 8 42 Q9 46 12 46 Q11 44 10 40 Z" fill="#6b4f0f"/>
  <!-- Broken end right -->
  <path d="M48 44 Q51 43 52 47 Q50 49 47 48 Q48 46 48 44 Z" fill="#6b4f0f"/>
  <!-- Small plank debris top-left -->
  <path d="M6 30 Q14 26 20 30 Q18 34 10 32 Z" fill="#a07520" transform="rotate(-15 13 30)"/>
  <path d="M7 29 Q14 25.5 18 29" fill="none" stroke="#6b4f0f" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
  <!-- Small plank debris right -->
  <path d="M46 30 Q54 27 58 31 Q56 35 50 33 Z" fill="#a07520" transform="rotate(10 52 31)"/>
  <!-- Rope/seaweed hanging off main log -->
  <path d="M30 36 Q28 42 26 48" fill="none" stroke="#5a7a1e" stroke-width="2" stroke-linecap="round"/>
  <path d="M36 37 Q38 43 36 49" fill="none" stroke="#5a7a1e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small floating splinter -->
  <rect x="18" y="27" width="10" height="3" rx="1.5" fill="#8B6914" transform="rotate(-8 23 28.5)"/>
  <!-- Water ripples around debris -->
  <path d="M4 48 Q12 45 20 48 Q28 51 36 48 Q44 45 52 48 Q58 46 62 48" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M4 52 Q14 49 24 52 Q34 55 44 52 Q54 49 62 52" fill="none" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- Bubbles -->
  <circle cx="22" cy="44" r="1.2" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.7"/>
  <circle cx="40" cy="46" r="1" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.7"/>
  <circle cx="15" cy="46" r="0.8" fill="none" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
</svg>
