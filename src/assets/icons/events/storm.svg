<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Storm - dark storm cloud with lightning bolt -->
  <!-- Background dark atmosphere -->
  <ellipse cx="32" cy="42" rx="28" ry="14" fill="#1f2937" opacity="0.25"/>
  <!-- Rear cloud layer (darker) -->
  <path d="M8 36 Q8 26 16 24 Q16 16 24 15 Q26 10 32 10 Q40 10 43 16 Q50 16 52 22 Q58 22 58 30 Q58 36 52 36 Z" fill="#374151"/>
  <!-- Main storm cloud -->
  <path d="M6 38 Q6 28 14 26 Q14 18 22 17 Q24 12 30 12 Q38 12 41 18 Q48 17 50 24 Q56 24 56 32 Q56 38 50 38 Z" fill="#4B5563"/>
  <!-- Cloud highlights/texture -->
  <path d="M10 32 Q12 26 18 25" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M20 18 Q26 14 32 14" fill="none" stroke="#6b7280" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Bottom cloud bumps -->
  <circle cx="18" cy="38" r="7" fill="#4B5563"/>
  <circle cx="28" cy="39" r="8" fill="#4B5563"/>
  <circle cx="40" cy="38" r="7" fill="#4B5563"/>
  <circle cx="50" cy="37" r="6" fill="#374151"/>
  <!-- Lightning bolt - main large bolt -->
  <path d="M35 36 L28 48 L34 48 L27 60 L42 44 L35 44 L40 36 Z" fill="#FBBF24"/>
  <!-- Lightning bolt inner highlight -->
  <path d="M35 38 L30 47 L35 47 L30 56 L39 45 L34 45 L38 38 Z" fill="#fde68a"/>
  <!-- Small secondary lightning bolt left -->
  <path d="M16 36 L13 43 L16 43 L12 50 L20 42 L17 42 L19 36 Z" fill="#FBBF24" opacity="0.7"/>
  <!-- Rain streaks below cloud -->
  <line x1="12" y1="44" x2="10" y2="52" stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="44" x2="18" y2="54" stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="48" y1="42" x2="46" y2="52" stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="54" y1="40" x2="52" y2="50" stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Lightning glow -->
  <path d="M35 36 L28 48 L34 48 L27 60 L42 44 L35 44 L40 36 Z" fill="#FBBF24" opacity="0.3" filter="url(#glow)"/>
</svg>
